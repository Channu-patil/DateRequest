<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Love Me? 🐻💕</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --pink:#ff8fab;
    --pink-dark:#ff5c8a;
    --cream:#fff3e6;
    --brown:#8a5a3b;
    --brown-dark:#6b4226;
    --brown-light:#c98a5e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Comic Sans MS','Segoe UI',cursive,sans-serif;
    overflow:hidden;
    background:linear-gradient(160deg,#ffd6e0,#ffb6c9 40%,#ff9fc0 100%);
  }
  #sky{
    position:fixed;inset:0;overflow:hidden;z-index:0;
  }
  .heart-float{
    position:absolute;
    bottom:-10%;
    font-size:24px;
    color:rgba(255,255,255,.85);
    animation:floatUp linear infinite;
    user-select:none;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    90%{opacity:1;}
    100%{transform:translateY(-110vh) rotate(360deg);opacity:0;}
  }

  .scene{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
  }

  h1#question{
    font-size:clamp(24px,5vw,44px);
    color:var(--brown-dark);
    text-shadow:2px 2px 0 #fff, 4px 4px 8px rgba(0,0,0,.1);
    margin-bottom:10px;
    animation:pop 1s ease;
  }
  @keyframes pop{
    0%{transform:scale(0);opacity:0;}
    70%{transform:scale(1.15);}
    100%{transform:scale(1);opacity:1;}
  }

  .subtitle{
    color:var(--brown);
    font-size:clamp(14px,2.2vw,18px);
    margin-bottom:30px;
  }

  .bears-row{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:40px;
    margin-bottom:20px;
    position:relative;
    min-height:220px;
  }

  /* ===== TEDDY BEAR ===== */
  .teddy{
    position:relative;
    width:150px;
    height:190px;
    transform-origin:bottom center;
  }
  .teddy.boy{ animation:sway 2.4s ease-in-out infinite; }
  .teddy.girl{ animation:sway 2.6s ease-in-out infinite .3s; }
  @keyframes sway{
    0%,100%{transform:rotate(-3deg);}
    50%{transform:rotate(3deg);}
  }

  .ear{
    position:absolute; width:38px;height:38px;border-radius:50%;
    top:-14px;
  }
  .ear.left{left:2px;}
  .ear.right{right:2px;}
  .ear::after{
    content:'';position:absolute;width:16px;height:16px;border-radius:50%;
    top:50%;left:50%;transform:translate(-50%,-50%);
  }

  .head{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:110px;height:100px;border-radius:50% 50% 46% 46%;
    z-index:3;
  }
  .snout{
    position:absolute; width:52px;height:40px;border-radius:50%;
    left:50%;top:50px;transform:translateX(-50%);
    z-index:4;
  }
  .snout::before{ /* nose */
    content:'';position:absolute;width:16px;height:12px;border-radius:50% 50% 60% 60%;
    background:var(--brown-dark);top:2px;left:50%;transform:translateX(-50%);
  }
  .mouth{
    position:absolute;width:20px;height:10px;left:50%;top:20px;
    transform:translateX(-50%);
    border-bottom:3px solid var(--brown-dark);
    border-radius:0 0 50% 50%;
  }
  .eye{
    position:absolute;width:9px;height:11px;background:#3a2317;border-radius:50%;
    top:38px;
  }
  .eye.l{left:26px;}
  .eye.r{right:26px;}
  .eye::after{
    content:'';position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;
    top:1px;left:1px;
  }
  .blush{
    position:absolute;width:16px;height:9px;border-radius:50%;
    top:60px;opacity:.6;
  }
  .blush.l{left:8px;background:#ff9fb0;}
  .blush.r{right:8px;background:#ff9fb0;}

  .body{
    position:absolute; top:82px; left:50%; transform:translateX(-50%);
    width:100px;height:95px;border-radius:46% 46% 50% 50%;
    z-index:2;
  }
  .belly{
    position:absolute;width:56px;height:56px;border-radius:50%;
    left:50%;top:16px;transform:translateX(-50%);
  }

  .arm{
    position:absolute; width:30px;height:65px;border-radius:20px;
    top:90px; z-index:1;
  }
  .arm.left{ left:2px; transform-origin:top center; }
  .arm.right{ right:2px; transform-origin:top center; }

  .leg{
    position:absolute;width:36px;height:40px;border-radius:40% 40% 50% 50%;
    top:165px; z-index:1;
  }
  .leg.left{left:18px;}
  .leg.right{right:18px;}

  /* boy colors */
  .boy .head, .boy .ear, .boy .body, .boy .arm, .boy .leg{ background:var(--brown); }
  .boy .snout, .boy .belly{ background:#f0d3b0; }
  .boy .ear::after{ background:#f0d3b0; }
  .boy .bowtie{
    position:absolute; left:50%; top:76px; transform:translateX(-50%);
    width:0;height:0;
    border-top:10px solid #4169e1;
    border-bottom:10px solid #4169e1;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    z-index:5;
  }
  .boy .bowtie::after{
    content:'';position:absolute;width:8px;height:8px;background:#27408b;border-radius:2px;
    top:-4px;left:-4px;
  }

  /* girl colors */
  .girl .head, .girl .ear, .girl .body, .girl .arm, .girl .leg{ background:var(--brown-light); }
  .girl .snout, .girl .belly{ background:#ffe9d6; }
  .girl .ear::after{ background:#ffe9d6; }
  .girl .bow{
    position:absolute; top:-26px; left:58%; transform:translateX(-50%) rotate(-8deg);
    width:34px;height:20px;
    z-index:6;
  }
  .girl .bow::before, .girl .bow::after{
    content:'';position:absolute;width:16px;height:16px;background:var(--pink-dark);
    border-radius:50% 10% 50% 10%;
  }
  .girl .bow::before{ left:0; transform:rotate(0deg);}
  .girl .bow::after{ right:0; transform:rotate(90deg);}
  .girl .lash{
    position:absolute; width:10px;height:2px;background:#3a2317;top:36px;
  }
  .girl .lash.l{left:24px;transform:rotate(-15deg);}
  .girl .lash.r{right:24px;transform:rotate(15deg);}

  /* wave animation for boy's right arm */
  .boy .arm.right{ animation:wave 1.2s ease-in-out infinite; }
  @keyframes wave{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(-40deg);}
  }
  .girl .arm.left{ animation:waveGirl 1.4s ease-in-out infinite .2s; }
  @keyframes waveGirl{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(30deg);}
  }

  .speech{
    position:absolute; top:-52px; left:50%; transform:translateX(-50%);
    background:#fff; padding:6px 12px; border-radius:16px;
    font-size:13px; color:var(--brown-dark); font-weight:bold;
    white-space:nowrap; box-shadow:0 3px 8px rgba(0,0,0,.15);
    animation:bob 2s ease-in-out infinite;
  }
  .speech::after{
    content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    border-width:8px 6px 0 6px;border-style:solid;
    border-color:#fff transparent transparent transparent;
  }
  @keyframes bob{
    0%,100%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-4px);}
  }

  .buttons{
    display:flex; gap:22px; margin-top:10px; position:relative;
  }
  button{
    font-family:inherit;
    font-size:18px;
    font-weight:bold;
    padding:14px 34px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.15);
    transition:transform .1s ease;
  }
  button:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  #yesBtn{
    background:linear-gradient(180deg,#7CFC9A,#3ddc6b);
    color:#0a4d24;
  }
  #noBtn{
    background:linear-gradient(180deg,#ff9aa2,#ff6b78);
    color:#5c0f16;
    position:relative;
  }

  #stage1{ transition:opacity .4s ease; }
  #stage2{
    display:none;
    z-index:2;
    animation:fadeIn 1s ease;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }

  #stage2 h1{
    font-size:clamp(26px,5vw,48px);
    color:#c2185b;
    text-shadow:2px 2px 0 #fff;
    margin-bottom:6px;
  }
  #stage2 h2{
    font-size:clamp(18px,3.4vw,28px);
    color:var(--brown-dark);
    margin-top:0;
    margin-bottom:26px;
  }

  /* Hugging teddies (external animated GIF) */
  .hug-wrap{
    position:relative;
    width:300px;height:245px;
    margin:0 auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    background:#fff;
    opacity:0;
    transform:scale(.85);
    transition:opacity .6s ease, transform .6s ease;
  }
  .hug-wrap.hugging{
    opacity:1;
    transform:scale(1);
  }
  .hug-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .kiss-heart{
    position:absolute;
    top:20px; left:50%; transform:translateX(-50%) scale(0);
    font-size:30px;
    animation:kissPop 1.6s ease-in-out 1.1s infinite;
    z-index:10;
  }
  @keyframes kissPop{
    0%{ transform:translateX(-50%) scale(0); opacity:0;}
    20%{ transform:translateX(-50%) scale(1.3); opacity:1;}
    40%{ transform:translateX(-50%) translateY(-20px) scale(1); opacity:1;}
    70%{ transform:translateX(-50%) translateY(-45px) scale(.8); opacity:.3;}
    100%{ transform:translateX(-50%) translateY(-60px) scale(.5); opacity:0;}
  }
  .kiss-heart:nth-child(2){ animation-delay:1.5s; left:44%; font-size:22px;}
  .kiss-heart:nth-child(3){ animation-delay:1.9s; left:58%; font-size:24px;}

  .final-note{
    margin-top:24px;
    font-size:clamp(14px,2.2vw,18px);
    color:var(--brown-dark);
    max-width:480px;
    line-height:1.5;
  }

  .sig{
    margin-top:14px;
    font-style:italic;
    color:var(--pink-dark);
    font-size:16px;
  }

  @media (max-width:480px){
    .bears-row{ gap:14px; }
    .teddy{ width:110px; height:150px; }
  }
</style>
</head>
<body>

<div id="sky"></div>

<div class="scene" id="stage1">
  <h1 id="question">Do you love me? 🥺💗</h1>
  <p class="subtitle">Someone really wants to know...</p>

  <div class="bears-row">
    <div class="teddy boy">
      <div class="speech">I love you!</div>
      <div class="bowtie"></div>
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="head"></div>
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div class="snout"></div>
      <div class="mouth"></div>
      <div class="blush l"></div>
      <div class="blush r"></div>
      <div class="body"></div>
      <div class="belly"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

    <div class="teddy girl">
      <div class="bow"></div>
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="head"></div>
      <div class="lash l"></div>
      <div class="lash r"></div>
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div class="snout"></div>
      <div class="mouth"></div>
      <div class="blush l"></div>
      <div class="blush r"></div>
      <div class="body"></div>
      <div class="belly"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>
  </div>

  <div class="buttons">
    <button id="yesBtn" onclick="sayYes()">Yes 💚</button>
    <button id="noBtn" onclick="dodge()">No 💔</button>
  </div>
</div>

<div class="scene" id="stage2">
  <h1>I knew it! 😍</h1>
  <h2>And I love you, Kiddo 💕</h2>

  <div class="hug-wrap" id="hugWrap">
    <div class="kiss-heart">💋</div>
    <div class="kiss-heart">💗</div>
    <div class="kiss-heart">💞</div>
    <img id="hugGif" src="https://gifdb.com/images/branded/high/a-cartoon-of-a-teddy-bear-hugging-another-teddy-bear-with-the-words-hugs-and-kisses-love-you-above-it-r6e13f6oo2ns4slh.gif" alt="Teddy bear hugging another teddy bear with hugs and kisses love you">
  </div>

  <p class="final-note">Every day with you feels like a warm hug and a hundred tiny kisses.
  Thank you for saying yes — to this, and to everything else. 🐻💛🐻</p>
  <p class="sig">— forever your goofy bear</p>
</div>

<script>
  // floating hearts background
  const sky = document.getElementById('sky');
  const heartChars = ['💗','💕','💖','💓','🩷'];
  for(let i=0;i<22;i++){
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    h.style.left = Math.random()*100 + '%';
    h.style.animationDuration = (6 + Math.random()*8) + 's';
    h.style.animationDelay = (Math.random()*8) + 's';
    h.style.fontSize = (16 + Math.random()*20) + 'px';
    sky.appendChild(h);
  }

  // "No" button dodges the cursor/finger
  const noBtn = document.getElementById('noBtn');
  function dodge(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 30;
    const maxY = window.innerHeight - noBtn.offsetHeight - 30;
    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;
    noBtn.style.position = 'fixed';
    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';
    noBtn.textContent = ['No 💔','Nope!','Try again 😜','Nuh-uh','Not happening 😂'][Math.floor(Math.random()*5)];
  }
  noBtn.addEventListener('mouseover', dodge);
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); dodge(); });

  function sayYes(){
    document.getElementById('stage1').style.display = 'none';
    const stage2 = document.getElementById('stage2');
    stage2.style.display = 'flex';
    setTimeout(()=>{
      document.getElementById('hugWrap').classList.add('hugging');
    }, 300);
  }

  // Fallback chain in case a GIF host is blocked on this network
  const hugGif = document.getElementById('hugGif');
  const fallbacks = [
    'https://gifdb.com/images/branded/high/two-teddy-bears-hugging-for-hug-a-bear-day-i4v754wceqnlddoh.gif',
    'https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExamNzdzJ1bzJrcWg0NWtrNDc3eDRoY2dqcXpiMWE3ZWVvdG8xYXk2bCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/9RMDOtALoaofK/giphy.gif',
    'https://media1.tenor.com/m/NOoT_FRiLLQAAAAd/bears-hug.gif'
  ];
  let fallbackIndex = 0;
  hugGif.addEventListener('error', function(){
    if(fallbackIndex < fallbacks.length){
      hugGif.src = fallbacks[fallbackIndex];
      fallbackIndex++;
    } else {
      // final fallback: hide broken image, show emoji-based hug instead
      hugGif.style.display = 'none';
      const emojiHug = document.createElement('div');
      emojiHug.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;font-size:70px;';
      emojiHug.textContent = '🧸🤗🧸';
      hugGif.parentNode.appendChild(emojiHug);
    }
  });
</script>

</body>
</html>
